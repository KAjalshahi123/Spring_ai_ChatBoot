<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .chat-header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .chat-body {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 75%;
        }

        .user {
            background: #4a90e2;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #e4e6eb;
            align-self: flex-start;
        }

        .chat-footer {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        .chat-footer input {
            flex: 1;
            padding: 8px;
        }

        .chat-footer button {
            padding: 8px 12px;
            margin-left: 5px;
            background: #4a90e2;
            color: white;
            border: none;
            cursor: pointer;
        }

        .loading {
            font-style: italic;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Spring AI Chat</div>

    <div class="chat-body" id="chatBody"></div>

    <div class="chat-footer">
        <input type="text" id="question" placeholder="Ask something..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    function addMessage(text, className) {
        const msg = document.createElement("div");
        msg.classList.add("message", className);
        msg.innerText = text;
        document.getElementById("chatBody").appendChild(msg);
        document.getElementById("chatBody").scrollTop =
            document.getElementById("chatBody").scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById("question");
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, "user");
        input.value = "";

        const loading = document.createElement("div");
        loading.classList.add("loading");
        loading.innerText = "AI is typing...";
        document.getElementById("chatBody").appendChild(loading);

        fetch("http://localhost:8081/chat?q=" + encodeURIComponent(question))
            .then(response => response.text())
            .then(data => {
                loading.remove();
                addMessage(data, "bot");
            })
            .catch(error => {
                loading.remove();
                addMessage("Error connecting to server.", "bot");
            });
    }
</script>

</body>
</html>
